name: validate-pr

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Collect changed dict files
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD -- 'dict/*.txt' || true)
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Validate naming in changed dict files
        run: |
          while read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *_short.txt|*_long.txt|onelistforallmicro.txt) ;;
              *)
                echo "Invalid dict filename: $f"
                exit 1
                ;;
            esac
          done <<'EOF'
          ${{ steps.changed.outputs.files }}
          EOF
      - name: olfa check
        run: go run ./cmd/olfa check
      - name: Go build
        run: go build ./cmd/olfa
