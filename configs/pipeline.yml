  "filters": {
    "regex_denylist": [
      "[\\!(,%]",
      "[0-9]{4,}",
      "[0-9]{3,}$",
      "[a-z0-9]{32}",
      "[0-9]+[A-Z0-9]{5,}",
      "\\/.*\\/.*\\/.*\\/.*\\/.*\\/.*\\/",
      "\\w{8}-\\w{4}-\\w{4}-\\w{4}-\\w{12}",
      "[0-9]+[a-zA-Z]+[0-9]+[a-zA-Z]+[0-9]+",
      "\\.(png|jpg|jpeg|gif|svg|bmp|ttf|avif|wav|mp4|aac|ajax|css|all)$",
      "^http",
      "^#",
      "data-view-component="
    ],
    "max_line_len": 100,
    "trim": true,
    "lowercase": false,
    "drop_empty": true
  },
  "category_filters": {
    "subdomains": {
      "regex_allowlist": ["^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$"]
    },
    "dns": {
      "regex_allowlist": ["^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$"]
    }
  },
  "classification": {
    "short_line_threshold": 5000,
    "content_sample_lines": 100,
    "path_rules": [
      {"pattern": "Discovery/DNS/*", "category": "subdomains"},
      {"pattern": "Discovery/Infrastructure/*", "category": "directories"},
      {"pattern": "attack/xss/*", "category": "xss"},
      {"pattern": "attack/sql-injection/*", "category": "sqli"},
      {"pattern": "attack/lfi/*", "category": "lfi"},
      {"pattern": "attack/rfi/*", "category": "rfi"},
      {"pattern": "attack/os-cmd-injection/*", "category": "command_injection"},
      {"pattern": "attack/xxe/*", "category": "xxe"},
      {"pattern": "attack/ldap/*", "category": "ldap"},
      {"pattern": "attack/file-upload/*", "category": "upload_variants"},
      {"pattern": "attack/csrf/*", "category": "fuzz_general"},
      {"pattern": "Discovery/Web-Content/CMS/*", "category_from_dirname": true, "pattern_note": "uses dirname"}
    ],
    "content_patterns": [
      {"pattern": "/wp-(content|admin|includes)/", "category": "wordpress"},
      {"pattern": "/sites/default/", "category": "drupal"},
      {"pattern": "\\.php[0-9]?$", "category": "php"},
      {"pattern": "\\.jsp$", "category": "jsp"},
      {"pattern": "\\.asp[x]?$", "category": "asp"},
      {"pattern": "<script|onerror=|javascript:", "category": "xss"},
      {"pattern": "SELECT.*FROM|UNION.*SELECT|' OR ", "category": "sqli"},
      {"pattern": "\\.\\./\\.\\./", "category": "traversal"},
      {"pattern": "<!ENTITY|<!DOCTYPE.*SYSTEM", "category": "xxe"},
      {"pattern": "\\$gt|\\$ne|\\$regex|\\$where", "category": "nosql"},
      {"pattern": "%0[dD]%0[aA]", "category": "crlf"},
      {"pattern": "\\{\\{.*\\}\\}|\\{%.*%\\}", "category": "ssti"},
      {"pattern": "169\\.254\\.169\\.254|http://127\\.0\\.0\\.1|http://localhost", "category": "ssrf"},
      {"pattern": ";\\s*(cat|ls|id|whoami|uname)|&&\\s*(cat|ls|id)", "category": "command_injection"},
      {"pattern": "/actuator/|/manage/", "category": "actuator"}
    ],
    "short_keywords": ["common", "short", "small", "top", "best", "mini", "micro", "default"],
    "long_keywords": ["all-levels", "big", "large", "full", "mega", "all_content"]
  },
  "build": {
    "profiles": [
      {"name": "all", "include_globs": ["dict/*_short.txt", "dict/*_long.txt"], "exclude_globs": [], "output_file": "onelistforall_big.txt"},
      {"name": "short", "include_globs": ["dict/*_short.txt"], "exclude_globs": [], "output_file": "onelistforall.txt"}
    ]
  },
  "dedupe": {"strategy": "external_merge", "chunk_lines": 200000, "temp_dir": "/tmp"},
  "release": {
    "split_7z": {"enabled": true, "volume_mb": 49},
    "outputs": ["onelistforallmicro.txt", "onelistforall.txt", "onelistforall_big.txt"],
    "checksum_file": "SHA256SUMS"
  }
}
